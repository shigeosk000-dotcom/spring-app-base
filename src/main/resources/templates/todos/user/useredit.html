<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${isEdit} ? 'ユーザー情報の編集' : '新規ユーザー登録'"></title>
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic Pro", "Noto Sans JP", sans-serif;
      background: #f8fafb;
      margin: 0;
      padding: 0;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      margin-bottom: 8px;
    }

    header p {
      color: #475569;
      margin-top: 0;
    }

    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.1);
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type=text],
    input[type=password],
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5f5;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .input-row {
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions button,
    .actions a {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
    }

    .actions button.primary,
    .actions a.primary {
      background: #2563eb;
    }

    .actions a.secondary {
      background: #f1f5f9;
      color: #1d4ed8;
    }

    .error {
      margin-top: 6px;
      font-size: 13px;
      color: #b91c1c;
    }

    .form-note {
      font-size: 13px;
      color: #475569;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1 th:text="${isEdit} ? 'ユーザー情報の編集' : '新規ユーザー登録'"></h1>
      <p><a href="/todos/user">一覧に戻る</a></p>
    </header>

    <div class="form-card">
      <form th:action="${isEdit} ? @{/todos/user/{id}(id=${userForm.id})} : @{/todos/user}" method="post" th:object="${userForm}">
        <div class="input-row">
          <label for="id">ユーザーID</label>
          <input type="text" id="id" th:field="*{id}" maxlength="10" th:attr="readonly=${isEdit} ? 'readonly' : null" />
          <div th:if="${#fields.hasErrors('id')}" th:errors="*{id}" class="error"></div>
        </div>
        <div class="input-row">
          <label for="name">氏名</label>
          <input type="text" id="name" th:field="*{name}" maxlength="20" />
          <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></div>
        </div>
        <div class="input-row">
          <label for="password">パスワード</label>
          <input type="password" id="password" th:field="*{password}" maxlength="64" />
          <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></div>
          <p class="form-note" th:text="${isEdit} ? '※未入力の場合、既存のパスワードを保持します。' : '※パスワードは全角・半角問わず8文字以上推奨です。'"></p>
        </div>
        <div class="input-row">
          <label>
            <input type="checkbox" th:field="*{authority}" /> 管理者として登録
          </label>
        </div>
        <div class="input-row">
          <label>
            <input type="checkbox" th:field="*{status}" /> 有効な状態で登録
          </label>
        </div>
        <div class="actions">
          <button type="submit" class="primary" th:text="${isEdit} ? '更新する' : '登録する'"></button>
          <a href="/todos/user" class="secondary">キャンセル</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
