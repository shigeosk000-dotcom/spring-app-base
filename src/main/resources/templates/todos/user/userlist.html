<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>ユーザー管理</title>
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic Pro", "Noto Sans JP", sans-serif;
      background: #f8fafb;
      margin: 0;
      padding: 0;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header p {
      color: #475569;
      margin-top: 4px;
    }

    .flash {
      padding: 12px;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 4px;
      margin-bottom: 20px;
      color: #0f172a;
    }

    .table-section {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #e2e8f0;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      color: #0f172a;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .actions button,
    .actions a {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
    }

    .actions a.secondary,
    .actions button.secondary {
      background: #2563eb;
    }

    .actions button.invert {
      background: #f1f5f9;
      color: #1d4ed8;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #f1f5f9;
      color: #0f172a;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>ユーザー管理</h1>
      <p>管理者・一般職員を登録・編集し、状態を切り替えられます。</p>
      <p><a href="/todos">タスク一覧に戻る</a></p>
    </header>

    <div th:if="${message}" class="flash" th:text="${message}"></div>

    <section class="table-section">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <h2 style="margin:0;">登録ユーザー</h2>
        <a href="/todos/user/new" class="secondary">新規登録</a>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>氏名</th>
            <th style="width:120px;">権限</th>
            <th style="width:120px;">状態</th>
            <th style="width:220px;">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.name}"></td>
            <td>
              <span class="tag" th:text="${user.authority} ? '管理者' : '一般'">権限</span>
            </td>
            <td>
              <span th:text="${user.status} ? '有効' : '無効'"></span>
            </td>
            <td>
              <div class="actions">
                <a th:href="@{/todos/user/{id}/check(id=${user.id})}" class="secondary">詳細</a>
                <a th:href="@{/todos/user/{id}/edit(id=${user.id})}" class="secondary">編集</a>
                <form th:action="@{/todos/user/{id}/toggle(id=${user.id})}" method="post" style="display:inline;">
                  <input type="hidden" name="status" th:value="${!user.status}" />
                  <button type="submit" class="invert" th:text="${user.status} ? '無効化' : '有効化'"></button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="5" style="text-align:center; color:#475569;">登録ユーザーがいません。</td>
          </tr>
        </tbody>
      </table>
      <p class="note">※状態を切り替えるとタスク一覧で利用可能な担当者が変わります。</p>
    </section>
  </div>
</body>
</html>
