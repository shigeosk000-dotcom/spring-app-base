<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${editing} ? 'タスク編集' : 'タスク新規登録'"></title>
  <style>
    body { font-family:"Yu Gothic","Noto Sans JP",sans-serif; background:#f8fafb; margin:0; padding:0; }
    .page { max-width:720px; margin:0 auto; padding:40px 20px 60px; }
    .form-card { background:#fff; padding:24px; border-radius:10px; box-shadow:0 2px 8px rgba(15,23,42,.1); }
    label { display:block; margin-bottom:6px; font-weight:600; }
    input, select, textarea { width:100%; padding:10px; border:1px solid #cbd5f5; border-radius:4px; font-size:14px; }
    .actions { display:flex; gap:10px; margin-top:10px; }
    .actions button, .actions a { padding:8px 16px; border-radius:6px; border:none; text-decoration:none; }
    .actions button.primary { background:#2563eb; color:#fff; }
    .links { margin-top:10px; }
    .error { color:#b91c1c; font-size:13px; margin-top:4px; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1 th:text="${editing} ? 'タスク編集' : 'タスク新規登録'"></h1>
      <p><a href="/todos/task/tasklist">タスク一覧に戻る</a></p>
    </header>
    <div class="form-card">
      <form th:action="${editing} ? @{/todos/task/taskedit/{id}(id=${todoForm.id})} : @{/todos/task/taskedit}" th:object="${todoForm}" method="post">
        <div>
          <label for="userId">担当者</label>
          <select id="userId" th:field="*{userId}">
            <option value="" disabled th:selected="${todoForm.userId == null}">担当者を選択</option>
            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name} + ' (' + ${user.id} + ')'" th:selected="${user.id == todoForm.userId}"></option>
          </select>
          <div class="error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></div>
        </div>
        <div>
          <label for="title">タイトル</label>
          <input type="text" id="title" th:field="*{title}" maxlength="100" placeholder="例：議事録作成" />
          <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>
        <div>
          <label for="description">詳細</label>
          <textarea id="description" th:field="*{description}" rows="3" maxlength="1000"></textarea>
        </div>
        <div>
          <label for="dueDate">期限</label>
          <input type="date" id="dueDate" th:field="*{dueDate}" />
        </div>
        <div>
          <label for="priority">優先度</label>
          <select id="priority" th:field="*{priority}">
            <option th:each="level : ${priorities}" th:value="${level}" th:text="${level}"></option>
          </select>
        </div>
        <div>
          <label><input type="checkbox" th:field="*{status}" /> 完了済みにする</label>
        </div>
        <div class="actions">
          <button type="submit" class="primary" th:text="${editing} ? '更新する' : '登録する'"></button>
          <a href="/todos/task/tasklist" style="background:#f1f5f9; color:#1d4ed8;">一覧へ戻る</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
