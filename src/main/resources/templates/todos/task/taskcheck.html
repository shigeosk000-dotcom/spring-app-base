<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>タスク確認</title>
  <style>
    body { font-family:"Yu Gothic","Noto Sans JP",sans-serif; background:#f8fafb; margin:0; padding:0; }
    .page { max-width:720px; margin:0 auto; padding:40px 20px 60px; }
    .card { background:#fff; padding:24px; border-radius:10px; box-shadow:0 2px 8px rgba(15,23,42,.1); }
    dl { display:grid; grid-template-columns:120px 1fr; gap:8px 16px; }
    dt { font-weight:600; color:#475569; }
    dd { margin:0; }
    .actions { margin-top:18px; display:flex; gap:8px; }
    .actions a { padding:8px 14px; border-radius:6px; text-decoration:none; color:#fff; }
    .primary { background:#2563eb; }
    .secondary { background:#94a3b8; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>タスク確認</h1>
      <p><a href="/todos/task/tasklist">戻る</a></p>
    </header>
    <div class="card">
      <dl>
        <dt>担当者</dt>
        <dd th:text="${todo.userName != null} ? todo.userName : todo.userId"></dd>
        <dt>タイトル</dt>
        <dd th:text="${todo.title}"></dd>
        <dt>詳細</dt>
        <dd th:text="${todo.description}"></dd>
        <dt>期限</dt>
        <dd th:text="${todo.dueDate != null} ? ${#temporals.format(todo.dueDate,'yyyy/MM/dd')} : '未設定'"></dd>
        <dt>優先度</dt>
        <dd th:text="${todo.priority}"></dd>
        <dt>ステータス</dt>
        <dd th:text="${todo.status} ? '完了' : '未完了'"></dd>
      </dl>
      <div class="actions">
        <a th:href="@{/todos/task/tasklist}" class="secondary">一覧へ戻る</a>
        <a th:href="@{/todos/task/taskedit/{id}(id=${todo.id})}" class="primary">編集する</a>
      </div>
    </div>
  </div>
  <!--
  <script th:if="${debugPopupMessage}" th:inline="javascript">
    alert([[${debugPopupMessage}]]);
  </script>
  -->
</body>
</html>
