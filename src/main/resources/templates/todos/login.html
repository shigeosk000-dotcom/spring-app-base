<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>ログイン（簡易画面）</title>
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic Pro", "Noto Sans JP", sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      padding: 32px;
      border-radius: 14px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #cbd5f5;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>簡易ログイン</h1>
      <p>仕様書ではログイン画面が要求されていますが、認証部分は省略し、画面のみ用意しました。</p>
      <p><a href="/todos">タスク一覧へ戻る</a></p>
    </div>
  </div>
</body>
</html>
