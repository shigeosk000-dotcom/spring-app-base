<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>ログイン</title>
  <style>
    body {
      font-family: "Yu Gothic", "Hiragino Kaku Gothic Pro", "Noto Sans JP", sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      padding: 32px;
      border-radius: 14px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #cbd5f5;
    }

    form {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #94a3b8;
      background: #0f172a;
      color: #fff;
    }

    .actions button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #22d3ee;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
    }

    .error {
      color: #fecdd3;
      font-size: 13px;
    }

    .links a {
      color: #38bdf8;
      text-decoration: none;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>ToDoアプリ・ログイン</h1>
      <p th:if="${message}" th:text="${message}"></p>
      <form th:action="@{/todos/login}" th:object="${loginForm}" method="post">
        <p class="error" th:if="${#fields.hasGlobalErrors()}" th:text="${#fields.globalErrors[0].defaultMessage}"></p>
        <div>
          <input type="text" th:field="*{id}" placeholder="ユーザーID" autocomplete="username" />
          <div class="error" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
        </div>
        <div>
          <input type="password" th:field="*{password}" placeholder="パスワード" autocomplete="current-password" />
          <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="actions">
          <button type="submit">ログイン</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
